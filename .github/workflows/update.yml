name: Update VPN Config

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час (в 00 минут)
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Установка библиотек
        run: pip install requests pyyaml
      - name: Запуск парсера
        run: python update_vpn.py
      - name: Сохранение и отправка в репозиторий
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add my_vless_collection.txt
          git commit -m "🚀 Автообновление конфигов" || exit 0
          git push
